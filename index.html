<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>时光纪念册 | 珍藏影集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f5f0e7 0%, #e8dfd3 100%);
            font-family: 'Segoe UI', 'Roboto', 'Georgia', 'Times New Roman', serif;
            padding: 2rem 1.5rem;
            color: #2e241f;
        }

        /* 纪念册主容器 */
        .memorial-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 252, 245, 0.85);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 245, 225, 0.6) inset;
            backdrop-filter: blur(1px);
            overflow: hidden;
            padding: 2rem 2rem 3rem 2rem;
            transition: all 0.3s ease;
        }

        /* 头部装饰 */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .header h1 {
            font-size: 3.2rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #b87c4f, #4a2e22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.05);
            font-weight: 600;
        }

        .header p {
            font-size: 1.1rem;
            color: #6b4c38;
            border-top: 1px solid #e2cfb5;
            display: inline-block;
            padding-top: 0.5rem;
            margin-top: 0.5rem;
            font-style: italic;
        }

        .ribbon {
            width: 80px;
            height: 4px;
            background: #dcae7c;
            margin: 1rem auto 0;
            border-radius: 4px;
        }

        /* 筛选/控制栏 */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 2.5rem;
            background: #fffaf3;
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.03);
            border: 1px solid #f0e2d2;
        }

        .counter {
            font-size: 0.95rem;
            background: #ede3d6;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            color: #5c3e2b;
            font-weight: 500;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: none;
            border: none;
            padding: 0.4rem 1.2rem;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #6b4c38;
            background: #f4ede5;
        }

        .filter-btn.active {
            background: #c58f5e;
            color: white;
            box-shadow: 0 2px 8px rgba(197, 143, 94, 0.3);
        }

        .filter-btn:hover:not(.active) {
            background: #e9d9cb;
            transform: translateY(-1px);
        }

        /* 照片网格 — 纪念册风格 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem 1.5rem;
            margin-top: 1rem;
        }

        /* 卡片相框 */
        .memory-card {
            background: #fffef7;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 15px 28px -10px rgba(0, 0, 0, 0.2);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(245, 225, 200, 0.8);
            position: relative;
        }

        .memory-card:hover {
            transform: translateY(-10px) scale(1.01);
            box-shadow: 0 28px 36px -12px rgba(0, 0, 0, 0.3);
        }

        /* 图片容器 */
        .img-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #f3ede5;
            position: relative;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            display: block;
        }

        .memory-card:hover .img-container img {
            transform: scale(1.03);
        }

        /* 卡片内容: 标题 + 日期 */
        .card-info {
            padding: 1rem 1.2rem 1.3rem 1.2rem;
            background: linear-gradient(to bottom, #fffdf9, #fff9f2);
        }

        .card-title {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.2px;
            color: #3e2a1f;
            margin-bottom: 0.25rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .card-title span {
            background: #f2e2d3;
            font-size: 0.7rem;
            font-weight: normal;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: #a2683c;
        }

        .card-date {
            font-size: 0.75rem;
            color: #b58a64;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            font-family: monospace;
        }

        .card-date::before {
            content: "📅";
            font-size: 0.7rem;
        }

        /* 轻量级装饰角落 */
        .memory-card::after {
            content: "❤️";
            position: absolute;
            bottom: 12px;
            right: 16px;
            font-size: 14px;
            opacity: 0.2;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .memory-card:hover::after {
            opacity: 0.6;
        }

        /* 空状态 */
        .empty-message {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            background: rgba(255,245,230,0.6);
            border-radius: 48px;
            font-size: 1.2rem;
            color: #b2895e;
            font-style: italic;
        }

        /* 模态框（大图预览） */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 85vw;
            max-height: 85vh;
            background: #fffaf2;
            border-radius: 32px;
            padding: 1rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.3s ease;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 75vh;
            border-radius: 24px;
            display: block;
            object-fit: contain;
        }

        .modal-caption {
            text-align: center;
            margin-top: 12px;
            font-size: 1rem;
            color: #543a28;
            font-weight: 500;
        }

        .close-modal {
            position: absolute;
            top: 24px;
            right: 32px;
            font-size: 2.2rem;
            color: white;
            background: rgba(0,0,0,0.5);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        .close-modal:hover {
            background: #c58f5e;
            transform: scale(1.05);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        footer {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: #b48b68;
            border-top: 1px dashed #e2cfb5;
            padding-top: 1.5rem;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .memorial-wrapper {
                padding: 1rem;
            }
            .header h1 {
                font-size: 2.2rem;
            }
            .control-bar {
                border-radius: 28px;
                padding: 0.8rem 1rem;
            }
            .gallery {
                gap: 1.2rem;
            }
            .modal-content {
                max-width: 95vw;
            }
        }
    </style>
</head>
<body>

<div class="memorial-wrapper">
    <div class="header">
        <h1>✨ 时光纪念册 ✨</h1>
        <div class="ribbon"></div>
        <p>每一帧，都是值得珍藏的回忆</p>
    </div>

    <div class="control-bar">
        <div class="counter" id="photoCounter">📸 加载中...</div>
        <div class="filter-group" id="filterGroup">
            <button data-filter="all" class="filter-btn active">🏠 全部回忆</button>
            <button data-filter="旅行" class="filter-btn">🌄 旅行</button>
            <button data-filter="日常" class="filter-btn">☕ 日常</button>
            <button data-filter="庆典" class="filter-btn">🎉 庆典</button>
            <button data-filter="校园" class="filter-btn">📚 校园</button>
        </div>
    </div>

    <div class="gallery" id="galleryContainer">
        <!-- js 动态渲染照片卡片 -->
        <div class="empty-message">✨ 正在载入回忆相册 ✨</div>
    </div>
    <footer>❤️ 点击照片放大 · 每一页都是独家记忆</footer>
</div>

<!-- 大图模态框 -->
<div id="modal" class="modal">
    <div class="close-modal">&times;</div>
    <div class="modal-content">
        <img id="modalImage" src="" alt="放大回忆">
        <div id="modalCaption" class="modal-caption"></div>
    </div>
</div>

<script>
    (function() {
        // ----- 使用 js 自动生成图片数据集 （纪念册目录风格）------
        // 为了展示自动插入图片，采用 unsplash 高清占位主题，但为了离线/演示稳定，结合LoremFlick? 但是使用稳定免费图片API容易跨域或失效
        // 我们使用占位图服务 "picsum.photos" 但为了纪念册真实感，结合自定义主题描述，并映射不同的类别和标题
        // 制作更真实风格: 使用 picsum 固定ID + 不同尺寸裁剪，根据类别调用不同种子，看起来风格多样且自动插入。
        // 同时为了保证每张图片独特，引入不同id 并且提供 alt 描述。完全通过js自动构建图片数组，无需手动写img链接
        
        // 定义纪念册条目数据 (类别、标题、日期、图片唯一标识)
        // 使用 picsum 摄影图片，但会看起来漂亮，同时可以模拟多种风格；也可以配合LoremFlick? picsum可提供真实摄影感且稳定
        // 我们构建32张图片，覆盖不同类别
        
        const memoryData = [
            { title: "海边的日落", category: "旅行", date: "2024-06-15", picId: 1015, desc: "落日染红海岸线" },
            { title: "咖啡馆慢时光", category: "日常", date: "2024-07-22", picId: 20, desc: "一杯拿铁的午后" },
            { title: "毕业典礼", category: "庆典", date: "2024-05-28", picId: 26, desc: "青春不散场" },
            { title: "图书馆一角", category: "校园", date: "2024-03-10", picId: 34, desc: "静谧学习时刻" },
            { title: "山间徒步", category: "旅行", date: "2024-08-01", picId: 42, desc: "登顶的喜悦" },
            { title: "生日派对", category: "庆典", date: "2024-09-12", picId: 55, desc: "许愿蜡烛" },
            { title: "街头随拍", category: "日常", date: "2024-07-04", picId: 60, desc: "城市烟火气" },
            { title: "樱花校园", category: "校园", date: "2024-04-05", picId: 76, desc: "春日限定" },
            { title: "沙漠露营", category: "旅行", date: "2024-10-18", picId: 82, desc: "星空银河" },
            { title: "好友聚餐", category: "日常", date: "2024-11-02", picId: 91, desc: "火锅热气腾腾" },
            { title: "周年纪念", category: "庆典", date: "2024-12-20", picId: 104, desc: "浪漫晚餐" },
            { title: "实验室日常", category: "校园", date: "2024-02-14", picId: 119, desc: "科研瞬间" },
            { title: "古镇漫步", category: "旅行", date: "2024-10-03", picId: 130, desc: "青石板路" },
            { title: "阳光早餐", category: "日常", date: "2024-08-24", picId: 145, desc: "元气一天" },
            { title: "跨年烟火", category: "庆典", date: "2024-12-31", picId: 158, desc: "新年期许" },
            { title: "操场奔跑", category: "校园", date: "2024-06-07", picId: 168, desc: "青春活力" },
            { title: "雪山脚下", category: "旅行", date: "2025-01-05", picId: 177, desc: "纯净世界" },
            { title: "午后阅读", category: "日常", date: "2024-09-18", picId: 183, desc: "书香伴茶" },
            { title: "婚礼现场", category: "庆典", date: "2024-10-10", picId: 191, desc: "见证幸福" },
            { title: "课堂讨论", category: "校园", date: "2024-11-11", picId: 198, desc: "思想碰撞" },
            { title: "瀑布远足", category: "旅行", date: "2024-08-29", picId: 206, desc: "水雾清凉" },
            { title: "宅家电影", category: "日常", date: "2024-12-05", picId: 217, desc: "舒适周末" },
            { title: "中秋团圆", category: "庆典", date: "2024-09-17", picId: 225, desc: "月饼赏月" },
            { title: "毕业旅行", category: "旅行", date: "2024-06-25", picId: 233, desc: "青春印记" },
            { title: "社团活动", category: "校园", date: "2024-04-20", picId: 240, desc: "动漫社合影" },
            { title: "森林野餐", category: "日常", date: "2024-07-30", picId: 247, desc: "草地美食" },
        ];
        
        // 扩充一些保证多样性
        const extraMemories = [
            { title: "新年音乐会", category: "庆典", date: "2025-01-01", picId: 260, desc: "金色大厅" },
            { title: "雨夜书店", category: "日常", date: "2024-11-19", picId: 272, desc: "安静角落" },
            { title: "骑行环湖", category: "旅行", date: "2024-09-05", picId: 285, desc: "微风拂面" },
            { title: "辩论赛", category: "校园", date: "2024-12-09", picId: 292, desc: "唇枪舌战" },
        ];
        
        const fullMemoryList = [...memoryData, ...extraMemories];
        
        // 辅助: 根据picId构建 图片url (使用 picsum 提供高质量摄影图片，支持尺寸和随机种子 优美)
        // 为了让图片风格更自然，统一使用 500x500 裁剪? 但需要适应卡片 1:1 表现，使用 600x600? 使用id/600/600
        // 因为不同id照片风格不一样，更像是真实纪念册
        const buildImageUrl = (picId) => {
            // picsum 提供真实照片，加上random参数避免缓存? 但是同一个ID图像稳定，更符合记忆一致性
            return `https://picsum.photos/id/${picId}/500/500?grayscale&seed=${picId}`;
            // 添加灰度滤镜可提高文艺感? 也可不加灰度: 但为了温柔色调，不加强对比，使用正常色彩
            // 为了视觉漂亮，去掉grayscale，改为自然色彩? 让图片充满回忆感，使用normal
        };
        
        // 更好的版本 - 色彩鲜艳版本: 
        const buildColorImageUrl = (picId) => {
            return `https://picsum.photos/id/${picId}/500/500`;  // 自然色彩
        };
        
        // 但有些图片可能ID无效？ picsum 常见的id 1-1000大多有效，多数有效，备用重试机制不影响展示，若偶尔加载失败则自动替换
        // 保证体验 设置图片onerror回退
        // 生成最终的数据（加上完整url）
        let items = fullMemoryList.map((item, idx) => {
            return {
                ...item,
                id: idx,
                imgUrl: buildColorImageUrl(item.picId),
                fallbackUrl: "https://picsum.photos/id/1/500/500"  // 备用经典
            };
        });
        
        // 当前选中的过滤器
        let currentFilter = "all";
        
        // 获取dom元素
        const galleryContainer = document.getElementById("galleryContainer");
        const photoCounterSpan = document.getElementById("photoCounter");
        const filterBtns = document.querySelectorAll(".filter-btn");
        const modal = document.getElementById("modal");
        const modalImage = document.getElementById("modalImage");
        const modalCaption = document.getElementById("modalCaption");
        const closeModalBtn = document.querySelector(".close-modal");
        
        // 渲染网格 (自动插入图片)
        function renderGallery() {
            // 根据过滤器筛选
            let filteredItems = items;
            if (currentFilter !== "all") {
                filteredItems = items.filter(item => item.category === currentFilter);
            }
            
            const totalCount = filteredItems.length;
            photoCounterSpan.innerHTML = `📖 共 ${totalCount} 张回忆`;
            
            if (filteredItems.length === 0) {
                galleryContainer.innerHTML = `<div class="empty-message">🍃 暂无「${currentFilter}」类回忆，去创造更多故事吧～</div>`;
                return;
            }
            
            // 生成所有卡片html
            let html = "";
            for (let item of filteredItems) {
                // 防止xss, 但标题等安全
                const safeTitle = escapeHtml(item.title);
                const safeDate = item.date;
                const safeCategory = item.category;
                const imgUrl = item.imgUrl;
                const fallback = item.fallbackUrl;
                
                html += `
                    <div class="memory-card" data-id="${item.id}" data-category="${item.category}" data-title="${safeTitle}" data-img="${imgUrl}" data-date="${safeDate}">
                        <div class="img-container">
                            <img src="${imgUrl}" alt="${safeTitle}" loading="lazy" onerror="this.onerror=null; this.src='${fallback}';">
                        </div>
                        <div class="card-info">
                            <div class="card-title">
                                ${safeTitle}
                                <span>${safeCategory}</span>
                            </div>
                            <div class="card-date">${safeDate}</div>
                        </div>
                    </div>
                `;
            }
            galleryContainer.innerHTML = html;
            
            // 绑定卡片点击事件（大图预览）
            const cards = document.querySelectorAll(".memory-card");
            cards.forEach(card => {
                card.addEventListener("click", (e) => {
                    // 避免点到内部按钮冒泡问题，直接获取data
                    const imgSrc = card.getAttribute("data-img");
                    const title = card.getAttribute("data-title");
                    const date = card.getAttribute("data-date");
                    if (imgSrc) {
                        modalImage.src = imgSrc;
                        modalCaption.innerHTML = `${title} &nbsp;|&nbsp; ${date}`;
                        modal.classList.add("active");
                    }
                });
            });
        }
        
        // 简单的防XSS辅助
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        // 切换过滤器状态
        function setActiveFilter(selectedFilterValue) {
            filterBtns.forEach(btn => {
                const btnFilter = btn.getAttribute("data-filter");
                if (btnFilter === selectedFilterValue) {
                    btn.classList.add("active");
                } else {
                    btn.classList.remove("active");
                }
            });
            currentFilter = selectedFilterValue;
            renderGallery();
        }
        
        // 监听筛选按钮
        function bindFilterEvents() {
            filterBtns.forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const filterValue = btn.getAttribute("data-filter");
                    if (filterValue === currentFilter) return;
                    setActiveFilter(filterValue);
                });
            });
        }
        
        // 模态框关闭
        function bindModalEvents() {
            closeModalBtn.addEventListener("click", () => {
                modal.classList.remove("active");
                modalImage.src = "";
            });
            modal.addEventListener("click", (e) => {
                if (e.target === modal) {
                    modal.classList.remove("active");
                    modalImage.src = "";
                }
            });
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && modal.classList.contains("active")) {
                    modal.classList.remove("active");
                    modalImage.src = "";
                }
            });
        }
        
        // 图片预加载优雅处理 + 全局备用error修正图片（防止单个挂图影响体验）
        function enhanceImageFallback() {
            // 动态监听所有图片加载失败，使用重新替换备用链接（picsum经典图片）
            document.addEventListener('error', (e) => {
                const target = e.target;
                if (target.tagName === 'IMG') {
                    const parentCard = target.closest('.memory-card');
                    if (parentCard && !target.dataset.fallbackAttempt) {
                        target.dataset.fallbackAttempt = 'true';
                        // 备选一个稳定图片 (ID=1 经典山景)
                        target.src = 'https://picsum.photos/id/1/500/500';
                    } else if (!target.dataset.fallbackAttempt) {
                        target.dataset.fallbackAttempt = 'true';
                        target.src = 'https://picsum.photos/id/1/500/500';
                    }
                }
            }, true);
        }
        
        // 初始化整个纪念册: 自动插入图片, 显示目录版
        function init() {
            bindFilterEvents();
            bindModalEvents();
            enhanceImageFallback();
            // 开始渲染 (自动生成图片)
            renderGallery();
        }
        
        // 为确保所有图片使用懒加载且无宽高闪烁, css已经处理好aspect-ratio
        init();
        
        // 可选: 增加动态背景微光效果, 适配移动端
        // 额外添加图片插入后的点击提示等已完备
        // 纪念册标题动画细节
        const headerTitle = document.querySelector('.header h1');
        if (headerTitle) {
            headerTitle.style.transition = '0.3s';
            headerTitle.addEventListener('mouseenter', () => {
                headerTitle.style.textShadow = '0 5px 12px rgba(0,0,0,0.1)';
            });
            headerTitle.addEventListener('mouseleave', () => {
                headerTitle.style.textShadow = '2px 2px 12px rgba(0,0,0,0.05)';
            });
        }
    })();
</script>
</body>
</html>
